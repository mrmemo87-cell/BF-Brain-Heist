<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Heist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500;700&display=swap');

    :root {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 4.9%;
      --card-foreground: 210 40% 98%;
      --popover: 222.2 84% 4.9%;
      --popover-foreground: 210 40% 98%;
      --primary: 172, 100%, 50%; /* Neon Cyan */
      --primary-foreground: 222.2 47.4% 11.2%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --accent: 291, 88%, 61%; /* Neon Magenta */
      --accent-foreground: 210 40% 98%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 217.2 32.6% 17.5%;
      --input: 217.2 32.6% 17.5%;
      --ring: 172, 100%, 50%;
      --radius: 1rem; /* rounded-2xl */
      
      --glow-primary: 0 0 5px hsl(var(--primary)), 0 0 10px hsl(var(--primary)), 0 0 20px hsl(var(--primary));
      --glow-accent: 0 0 5px hsl(var(--accent)), 0 0 10px hsl(var(--accent)), 0 0 20px hsl(var(--accent));
      --glow-gold: 0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 20px #ffd700;
      --glow-silver: 0 0 5px #c0c0c0, 0 0 10px #c0c0c0, 0 0 20px #c0c0c0;
      --glow-bronze: 0 0 5px #cd7f32, 0 0 10px #cd7f32, 0 0 20px #cd7f32;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'Roboto', sans-serif;
    }
    
    .font-heading {
        font-family: 'Orbitron', sans-serif;
    }

    .glassmorphism {
      background: rgba(23, 26, 33, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .progress-bar-glow {
        filter: drop-shadow(var(--glow-primary));
    }
  </style>
<script type="importmap">

    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.4",
    "next": "https://aistudiocdn.com/next@^16.0.0",
    "next/": "https://aistudiocdn.com/next@^16.0.0/",
    "tailwindcss": "https://aistudiocdn.com/tailwindcss@^4.1.15",

}
